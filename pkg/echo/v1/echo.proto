syntax = "proto3";

option go_package = "github.com/ripta/netdebug/pkg/echo/v1";
package pkg.echo.v1;

service Echoer {
  rpc Echo (EchoRequest) returns (EchoResponse) {}
  rpc Status (StatusRequest) returns (StatusResponse) {}
}

enum PayloadShape {
  PAYLOAD_SHAPE_UNSPECIFIED = 0;
  PAYLOAD_SHAPE_STRING = 1;
  PAYLOAD_SHAPE_BYTES = 2;
  PAYLOAD_SHAPE_EMBEDDING_FLOAT = 3;
  PAYLOAD_SHAPE_EMBEDDING_BYTES = 4;
  PAYLOAD_SHAPE_MIXED = 5;
}

message EchoRequest {
  string query = 1;
  PayloadShape shape = 2;
  oneof payload {
    string string_payload = 10;
    bytes bytes_payload = 11;
    EmbeddingFloat embedding_float = 12;
    bytes embedding_bytes = 13;
    MixedPayload mixed = 14;
  }
}

message EchoResponse {
  string query = 1;

  KubernetesInfo kubernetes = 2;
  RequestInfo request = 3;
  RuntimeInfo runtime = 4;
  repeated ExtendedInfo extensions = 5;

  int64 server_duration_ns = 6;
  int64 received_at_unix_nano = 7;
  int64 sent_at_unix_nano = 8;
  PayloadShape shape = 9;
  oneof payload {
    string string_payload = 10;
    bytes bytes_payload = 11;
    EmbeddingFloat embedding_float = 12;
    bytes embedding_bytes = 13;
    MixedPayload mixed = 14;
  }
}

message ExtendedInfo {
  string name = 1;
  KeyMultivalue info = 2;
}

message KubernetesInfo {
  string hostname = 1;
  string pod_name = 2;
  string pod_namespace = 3;
  string pod_node = 4;
}

message RequestInfo {
  string protocol = 1;
  string remote_addr = 2;
  string method = 3;
  string uri = 4;
  ParsedURL parsed_url = 5;
  repeated KeyMultivalue header = 6;
}

message ParsedURL {
  string scheme = 1;
  string host = 2;
  string path = 3;
  string raw_path = 4;
  string raw_query = 5;
  repeated KeyMultivalue query = 6;
}

message KeyMultivalue {
  string key = 1;
  repeated string values = 2;
}

message RuntimeInfo {
  string go_version = 1;
  string go_arch = 2;
  string go_os = 3;
  int64 num_cpus = 4;
  int64 num_goroutines = 5;
  string main_module = 6;
  string main_path = 7;
  string main_version = 8;
}

message EmbeddingFloat {
  repeated float values = 1;
}

message MixedPayload {
  int64 id = 1;
  string name = 2;
  int32 count = 3;
  double ratio = 4;
  bool enabled = 5;
  repeated string tags = 6;
  repeated int32 numbers = 7;
  map<string, string> attrs = 8;
  bytes blob = 9;
  KeyMultivalue extra = 10;
}

// StatusRequest determines the error (if any) to return to the caller, representing
// on-wire status that the caller expects from the server.
message StatusRequest {
  // force_grpc_status forces a status response conforming to the standard
  // gRPC Core status codes: https://grpc.github.io/grpc/core/md_doc_statuscodes.html
  // Following those standard status codes, a value of zero (or unset) will
  // return OK.
  uint32 force_grpc_status = 1;
  // message is an optional string returned alongside the code.
  string message = 2;
}

// StatusResponse is a (currently) empty gRPC message.
message StatusResponse {}